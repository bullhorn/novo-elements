name: CI

on: [pull_request]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
      - name: Update npm
        run: npm install -g npm@10.9.7
      - name: Install Dependencies
        run: |
          npm ci
      - name: Test
        run: |
          npm run lint
          npm test
      - name: Build
        run: |
          npm run build:ci
      - uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: dist

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
          CURRENT_BRANCH: ${{ github.head_ref }}
        run: sh snapshot-publish